name: Fallback

on:
  pull_request:
    paths:
      - '.github/**'
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-success:
    name: Check workflow success
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "No tool tests required for this PR"'
